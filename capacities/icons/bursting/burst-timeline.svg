<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="500" height="220">
  <!-- Burst Timeline - Shows burst accumulation and consumption over time -->

  <text x="250" y="18" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#323130" text-anchor="middle">Burst Bank Over Time</text>

  <!-- Background grid -->
  <defs>
    <pattern id="burstTimeGrid" width="50" height="30" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 30" fill="none" stroke="#0D5A4C" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect x="50" y="35" width="420" height="120" fill="url(#burstTimeGrid)"/>

  <!-- Max burst line -->
  <line x1="50" y1="45" x2="470" y2="45" stroke="#A84D0A" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="475" y="50" font-family="Segoe UI, sans-serif" font-size="9" fill="#A84D0A">Max (10 min)</text>

  <!-- Zero line -->
  <line x1="50" y1="155" x2="470" y2="155" stroke="#0D5A4C" stroke-width="1"/>
  <text x="475" y="160" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">Empty</text>

  <!-- Burst bank fill area -->
  <path d="M 50 155 L 50 130 L 80 120 L 120 100 L 160 85 L 200 75 L 220 70
           L 240 90 L 260 120 L 280 140 L 300 150
           L 320 145 L 360 130 L 400 110 L 440 95 L 470 85 L 470 155 Z"
        fill="#F2C811" opacity="0.3"/>

  <!-- Burst bank line -->
  <path d="M 50 130 L 80 120 L 120 100 L 160 85 L 200 75 L 220 70
           L 240 90 L 260 120 L 280 140 L 300 150
           L 320 145 L 360 130 L 400 110 L 440 95 L 470 85"
        fill="none" stroke="#F2C811" stroke-width="3"/>

  <!-- Usage indicator line (inverse - shows where usage is high) -->
  <path d="M 50 140 L 80 138 L 120 135 L 160 132 L 200 130 L 220 128
           L 240 50 L 260 55 L 280 60 L 300 65
           L 320 135 L 360 132 L 400 130 L 440 128 L 470 125"
        fill="none" stroke="#D13438" stroke-width="2" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- Annotations -->
  <!-- Low usage zone -->
  <rect x="70" y="160" width="130" height="18" fill="#107C10" opacity="0.1" rx="3"/>
  <text x="135" y="173" font-family="Segoe UI, sans-serif" font-size="8" fill="#107C10" text-anchor="middle">Accumulating ↑</text>

  <!-- Spike zone -->
  <rect x="230" y="160" width="80" height="18" fill="#D13438" opacity="0.1" rx="3"/>
  <text x="270" y="173" font-family="Segoe UI, sans-serif" font-size="8" fill="#D13438" text-anchor="middle">Spike! ↓</text>

  <!-- Recovery zone -->
  <rect x="330" y="160" width="120" height="18" fill="#107C10" opacity="0.1" rx="3"/>
  <text x="390" y="173" font-family="Segoe UI, sans-serif" font-size="8" fill="#107C10" text-anchor="middle">Recovering ↑</text>

  <!-- Time axis -->
  <text x="50" y="195" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">0</text>
  <text x="155" y="195" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">5 min</text>
  <text x="260" y="195" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">10 min</text>
  <text x="365" y="195" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">15 min</text>
  <text x="455" y="195" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">20 min</text>

  <!-- Legend -->
  <rect x="60" y="205" width="50" height="10" fill="#F2C811" opacity="0.5"/>
  <text x="115" y="213" font-family="Segoe UI, sans-serif" font-size="9" fill="#323130">Burst Bank Level</text>
  <line x1="220" y1="210" x2="260" y2="210" stroke="#D13438" stroke-width="2" stroke-dasharray="4,2" opacity="0.6"/>
  <text x="265" y="213" font-family="Segoe UI, sans-serif" font-size="9" fill="#323130">Usage Level (inverted)</text>
</svg>