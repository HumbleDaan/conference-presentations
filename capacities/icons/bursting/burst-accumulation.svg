<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 280" width="450" height="280">
  <!-- Burst Accumulation - Shows how unused capacity builds burst bank -->

  <text x="225" y="20" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#323130" text-anchor="middle">Burst Capacity Accumulation</text>

  <!-- Left panel: Low usage = accumulation -->
  <rect x="20" y="40" width="190" height="180" fill="none" stroke="#0D5A4C" stroke-width="1" rx="4"/>
  <text x="115" y="55" font-family="Segoe UI, sans-serif" font-size="11" fill="#107C10" text-anchor="middle" font-weight="600">Low Usage Period</text>

  <!-- Capacity bar background -->
  <rect x="40" y="70" width="30" height="130" fill="#117865" opacity="0.15" rx="2"/>
  <rect x="80" y="70" width="30" height="130" fill="#117865" opacity="0.15" rx="2"/>
  <rect x="120" y="70" width="30" height="130" fill="#117865" opacity="0.15" rx="2"/>
  <rect x="160" y="70" width="30" height="130" fill="#117865" opacity="0.15" rx="2"/>

  <!-- Actual usage (low) -->
  <rect x="40" y="170" width="30" height="30" fill="#117865" opacity="0.85" rx="2"/>
  <rect x="80" y="165" width="30" height="35" fill="#117865" opacity="0.85" rx="2"/>
  <rect x="120" y="175" width="30" height="25" fill="#117865" opacity="0.85" rx="2"/>
  <rect x="160" y="168" width="30" height="32" fill="#117865" opacity="0.85" rx="2"/>

  <!-- Accumulated burst (green checkmarks) -->
  <text x="55" y="160" font-family="Segoe UI, sans-serif" font-size="14" fill="#107C10">↑</text>
  <text x="95" y="155" font-family="Segoe UI, sans-serif" font-size="14" fill="#107C10">↑</text>
  <text x="135" y="163" font-family="Segoe UI, sans-serif" font-size="14" fill="#107C10">↑</text>
  <text x="175" y="157" font-family="Segoe UI, sans-serif" font-size="14" fill="#107C10">↑</text>

  <text x="115" y="212" font-family="Segoe UI, sans-serif" font-size="9" fill="#107C10" text-anchor="middle">Unused capacity</text>
  <text x="115" y="222" font-family="Segoe UI, sans-serif" font-size="9" fill="#107C10" text-anchor="middle">→ Burst bank</text>

  <!-- Arrow between panels -->
  <path d="M 220 130 L 240 130 L 235 125 M 240 130 L 235 135" fill="none" stroke="#0D5A4C" stroke-width="2"/>

  <!-- Right panel: Burst bank visualization -->
  <rect x="250" y="40" width="180" height="180" fill="none" stroke="#0D5A4C" stroke-width="1" rx="4"/>
  <text x="340" y="55" font-family="Segoe UI, sans-serif" font-size="11" fill="#117865" text-anchor="middle" font-weight="600">Burst Bank</text>

  <!-- Bank container -->
  <rect x="280" y="70" width="120" height="120" fill="none" stroke="#117865" stroke-width="2" rx="4"/>

  <!-- Accumulated burst units (filling up) -->
  <rect x="285" y="165" width="25" height="20" fill="#F2C811" rx="2"/>
  <rect x="315" y="165" width="25" height="20" fill="#F2C811" rx="2"/>
  <rect x="345" y="165" width="25" height="20" fill="#F2C811" rx="2"/>
  <rect x="375" y="165" width="20" height="20" fill="#F2C811" rx="2"/>
  <rect x="285" y="140" width="25" height="20" fill="#F2C811" rx="2"/>
  <rect x="315" y="140" width="25" height="20" fill="#F2C811" rx="2"/>
  <rect x="345" y="140" width="25" height="20" fill="#F2C811" rx="2"/>
  <rect x="285" y="115" width="25" height="20" fill="#F2C811" rx="2" opacity="0.5"/>
  <rect x="315" y="115" width="25" height="20" fill="#F2C811" rx="2" opacity="0.5"/>

  <!-- Max indicator -->
  <line x1="280" y1="75" x2="400" y2="75" stroke="#A84D0A" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="340" y="85" font-family="Segoe UI, sans-serif" font-size="8" fill="#A84D0A" text-anchor="middle">Max: 10 min capacity</text>

  <!-- Fill indicator -->
  <text x="340" y="205" font-family="Segoe UI, sans-serif" font-size="10" fill="#117865" text-anchor="middle">~70% full</text>

  <!-- Bottom explanation -->
  <rect x="20" y="235" width="410" height="35" fill="#117865" opacity="0.08" rx="4"/>
  <text x="225" y="250" font-family="Segoe UI, sans-serif" font-size="10" fill="#323130" text-anchor="middle">When usage is below capacity, unused CU-seconds accumulate in the burst bank.</text>
  <text x="225" y="262" font-family="Segoe UI, sans-serif" font-size="10" fill="#323130" text-anchor="middle">Maximum bank size = 10 minutes of your capacity (e.g., F64 = 38,400 CU-seconds)</text>
</svg>