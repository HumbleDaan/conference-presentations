<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <!-- Capacity Metrics App Dashboard Mockup -->

  <text x="200" y="18" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#323130" text-anchor="middle">Microsoft Fabric Capacity Metrics App</text>

  <!-- Main dashboard frame -->
  <rect x="20" y="30" width="360" height="200" fill="white" stroke="#0D5A4C" stroke-width="1" rx="4"/>

  <!-- Header bar -->
  <rect x="20" y="30" width="360" height="25" fill="#117865" rx="4"/>
  <rect x="20" y="45" width="360" height="10" fill="#117865"/>
  <text x="35" y="47" font-family="Segoe UI, sans-serif" font-size="10" fill="white">Capacity Metrics</text>
  <circle cx="355" cy="42" r="6" fill="white" opacity="0.3"/>

  <!-- Date range selector mockup -->
  <rect x="280" y="60" width="90" height="18" fill="#f3f2f1" stroke="#0D5A4C" stroke-width="0.5" rx="2"/>
  <text x="325" y="73" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">Last 14 days ▼</text>

  <!-- Mini chart 1: Utilization -->
  <rect x="30" y="60" width="110" height="70" fill="#f8f8f8" stroke="#0D5A4C" stroke-width="0.5" rx="2"/>
  <text x="85" y="74" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">CU Utilization</text>
  <!-- Mini bar chart -->
  <rect x="40" y="110" width="8" height="15" fill="#117865"/>
  <rect x="52" y="100" width="8" height="25" fill="#117865"/>
  <rect x="64" y="95" width="8" height="30" fill="#A84D0A"/>
  <rect x="76" y="105" width="8" height="20" fill="#117865"/>
  <rect x="88" y="108" width="8" height="17" fill="#117865"/>
  <rect x="100" y="100" width="8" height="25" fill="#117865"/>
  <rect x="112" y="103" width="8" height="22" fill="#117865"/>

  <!-- Mini chart 2: Throttling -->
  <rect x="150" y="60" width="110" height="70" fill="#f8f8f8" stroke="#0D5A4C" stroke-width="0.5" rx="2"/>
  <text x="205" y="74" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">Throttling Events</text>
  <!-- Mini line chart -->
  <path d="M 160 115 L 175 110 L 190 85 L 205 105 L 220 100 L 235 108 L 250 112"
        fill="none" stroke="#D13438" stroke-width="1.5"/>
  <circle cx="190" cy="85" r="3" fill="#D13438"/>

  <!-- Interactive vs Background breakdown -->
  <rect x="30" y="140" width="170" height="80" fill="#f8f8f8" stroke="#0D5A4C" stroke-width="0.5" rx="2"/>
  <text x="115" y="154" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">Operation Type Breakdown</text>
  <!-- Stacked bars -->
  <rect x="45" y="165" width="25" height="20" fill="#D13438" opacity="0.85"/>
  <rect x="45" y="185" width="25" height="25" fill="#0078D4" opacity="0.85"/>
  <rect x="80" y="160" width="25" height="25" fill="#D13438" opacity="0.85"/>
  <rect x="80" y="185" width="25" height="25" fill="#0078D4" opacity="0.85"/>
  <rect x="115" y="170" width="25" height="15" fill="#D13438" opacity="0.85"/>
  <rect x="115" y="185" width="25" height="25" fill="#0078D4" opacity="0.85"/>
  <rect x="150" y="168" width="25" height="17" fill="#D13438" opacity="0.85"/>
  <rect x="150" y="185" width="25" height="25" fill="#0078D4" opacity="0.85"/>
  <!-- Legend -->
  <rect x="45" y="215" width="8" height="8" fill="#D13438"/>
  <text x="56" y="222" font-family="Segoe UI, sans-serif" font-size="7" fill="#323130">Interactive</text>
  <rect x="105" y="215" width="8" height="8" fill="#0078D4"/>
  <text x="116" y="222" font-family="Segoe UI, sans-serif" font-size="7" fill="#323130">Background</text>

  <!-- Top workloads panel -->
  <rect x="210" y="140" width="160" height="80" fill="#f8f8f8" stroke="#0D5A4C" stroke-width="0.5" rx="2"/>
  <text x="290" y="154" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">Top Workloads by CU</text>
  <!-- List items -->
  <rect x="220" y="162" width="80" height="10" fill="#117865" rx="1"/>
  <text x="305" y="170" font-family="Segoe UI, sans-serif" font-size="7" fill="#323130">Power BI</text>
  <rect x="220" y="177" width="60" height="10" fill="#117865" rx="1"/>
  <text x="285" y="185" font-family="Segoe UI, sans-serif" font-size="7" fill="#323130">Dataflow</text>
  <rect x="220" y="192" width="45" height="10" fill="#117865" rx="1"/>
  <text x="270" y="200" font-family="Segoe UI, sans-serif" font-size="7" fill="#323130">Notebook</text>
  <rect x="220" y="207" width="30" height="10" fill="#117865" rx="1"/>
  <text x="255" y="215" font-family="Segoe UI, sans-serif" font-size="7" fill="#323130">SQL</text>

  <!-- App store badge -->
  <text x="200" y="245" font-family="Segoe UI, sans-serif" font-size="8" fill="#0078D4" text-anchor="middle">Free in Microsoft AppSource</text>
</svg>