<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="500" height="220">
  <!-- Reservation vs Burst Comparison -->

  <text x="250" y="20" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#323130" text-anchor="middle">Reservation vs. Burst Capacity</text>

  <!-- Left side: Without Reservation -->
  <rect x="20" y="40" width="210" height="165" fill="none" stroke="#0D5A4C" stroke-width="1" rx="4"/>
  <text x="125" y="58" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#D13438" text-anchor="middle">Without Reservation</text>

  <!-- Capacity bar without reservation -->
  <rect x="40" y="75" width="170" height="80" fill="none" stroke="#0D5A4C" stroke-width="1" rx="2"/>

  <!-- All capacity available to everyone -->
  <rect x="45" y="80" width="160" height="70" fill="#117865" opacity="0.3"/>
  <text x="125" y="120" font-family="Segoe UI, sans-serif" font-size="9" fill="#117865" text-anchor="middle">Shared Pool (64 CU)</text>

  <!-- User icons competing -->
  <text x="65" y="140" font-family="Segoe UI, sans-serif" font-size="12">👤</text>
  <text x="95" y="140" font-family="Segoe UI, sans-serif" font-size="12">👤</text>
  <text x="125" y="140" font-family="Segoe UI, sans-serif" font-size="12">👤</text>
  <text x="155" y="140" font-family="Segoe UI, sans-serif" font-size="12">👤</text>

  <text x="125" y="175" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">First-come, first-served</text>
  <text x="125" y="188" font-family="Segoe UI, sans-serif" font-size="8" fill="#D13438" text-anchor="middle">Risk: Heavy user affects everyone</text>

  <!-- Right side: With Reservation -->
  <rect x="270" y="40" width="210" height="165" fill="none" stroke="#0D5A4C" stroke-width="1" rx="4"/>
  <text x="375" y="58" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#107C10" text-anchor="middle">With Reservation</text>

  <!-- Capacity bar with reservation -->
  <rect x="290" y="75" width="170" height="80" fill="none" stroke="#0D5A4C" stroke-width="1" rx="2"/>

  <!-- Reserved portion -->
  <rect x="295" y="80" width="50" height="70" fill="#0078D4" opacity="0.5"/>
  <text x="320" y="105" font-family="Segoe UI, sans-serif" font-size="7" fill="#0078D4" text-anchor="middle">Reserved</text>
  <text x="320" y="115" font-family="Segoe UI, sans-serif" font-size="7" fill="#0078D4" text-anchor="middle">16 CU</text>
  <text x="315" y="140" font-family="Segoe UI, sans-serif" font-size="12">👤</text>

  <!-- Shared portion -->
  <rect x="350" y="80" width="105" height="70" fill="#117865" opacity="0.3"/>
  <text x="403" y="110" font-family="Segoe UI, sans-serif" font-size="7" fill="#117865" text-anchor="middle">Shared Pool</text>
  <text x="403" y="120" font-family="Segoe UI, sans-serif" font-size="7" fill="#117865" text-anchor="middle">48 CU</text>
  <text x="370" y="140" font-family="Segoe UI, sans-serif" font-size="12">👤</text>
  <text x="400" y="140" font-family="Segoe UI, sans-serif" font-size="12">👤</text>
  <text x="430" y="140" font-family="Segoe UI, sans-serif" font-size="12">👤</text>

  <text x="375" y="175" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">Guaranteed capacity for critical work</text>
  <text x="375" y="188" font-family="Segoe UI, sans-serif" font-size="8" fill="#107C10" text-anchor="middle">Protected: Always has 16 CU available</text>
</svg>