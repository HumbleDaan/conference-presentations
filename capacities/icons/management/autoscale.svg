<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200" width="450" height="200">
  <!-- Autoscale Visualization -->

  <text x="225" y="20" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#323130" text-anchor="middle">Autoscale: Automatic Capacity Adjustment</text>

  <!-- Background grid -->
  <defs>
    <pattern id="autoGrid" width="40" height="30" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 30" fill="none" stroke="#0D5A4C" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect x="50" y="40" width="350" height="110" fill="url(#autoGrid)"/>

  <!-- Base capacity line -->
  <path d="M 50 120 L 130 120 L 135 120 L 140 100 L 250 100 L 255 100 L 260 120 L 400 120"
        fill="none" stroke="#117865" stroke-width="3"/>

  <!-- Scale up indicator -->
  <path d="M 137 125 L 137 95 L 132 100 M 137 95 L 142 100" fill="none" stroke="#107C10" stroke-width="2"/>
  <text x="137" y="140" font-family="Segoe UI, sans-serif" font-size="8" fill="#107C10" text-anchor="middle">Scale Up</text>

  <!-- Scale down indicator -->
  <path d="M 257 95 L 257 125 L 252 120 M 257 125 L 262 120" fill="none" stroke="#A84D0A" stroke-width="2"/>
  <text x="257" y="140" font-family="Segoe UI, sans-serif" font-size="8" fill="#A84D0A" text-anchor="middle">Scale Down</text>

  <!-- Usage line showing why autoscale triggers -->
  <path d="M 50 130 L 100 125 L 130 100 L 160 85 L 200 80 L 240 85 L 270 115 L 320 125 L 400 130"
        fill="none" stroke="#D13438" stroke-width="2" stroke-dasharray="4,2" opacity="0.7"/>

  <!-- Labels -->
  <text x="90" y="115" font-family="Segoe UI, sans-serif" font-size="9" fill="#117865">F64</text>
  <text x="190" y="95" font-family="Segoe UI, sans-serif" font-size="9" fill="#117865">F128</text>
  <text x="330" y="115" font-family="Segoe UI, sans-serif" font-size="9" fill="#117865">F64</text>

  <!-- Time axis -->
  <line x1="50" y1="150" x2="400" y2="150" stroke="#0D5A4C" stroke-width="1"/>
  <text x="225" y="165" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C" text-anchor="middle">Time →</text>

  <!-- Legend -->
  <line x1="60" y1="180" x2="90" y2="180" stroke="#117865" stroke-width="3"/>
  <text x="95" y="184" font-family="Segoe UI, sans-serif" font-size="9" fill="#323130">Capacity</text>
  <line x1="180" y1="180" x2="210" y2="180" stroke="#D13438" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="215" y="184" font-family="Segoe UI, sans-serif" font-size="9" fill="#323130">Demand</text>

  <!-- Key point callout -->
  <rect x="300" y="170" width="130" height="25" fill="#117865" opacity="0.1" rx="4"/>
  <text x="365" y="186" font-family="Segoe UI, sans-serif" font-size="8" fill="#117865" text-anchor="middle">Max CU cap configurable</text>
</svg>