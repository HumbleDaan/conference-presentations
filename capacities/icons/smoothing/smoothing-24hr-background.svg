<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- 24-Hour Background Smoothing Window Visualization -->
  <!-- Shows background operations spread across 24 hours -->

  <!-- Background grid -->
  <defs>
    <pattern id="grid24hr" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0D5A4C" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect x="40" y="20" width="340" height="140" fill="url(#grid24hr)"/>

  <!-- Capacity limit line -->
  <line x1="40" y1="60" x2="380" y2="60" stroke="#0D5A4C" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="385" y="65" font-family="Segoe UI, sans-serif" font-size="11" fill="#0D5A4C">Capacity Limit</text>

  <!-- Scheduled job spikes (Background Blue, semi-transparent) -->
  <rect x="60" y="40" width="20" height="120" fill="#0078D4" opacity="0.3"/>
  <rect x="180" y="50" width="25" height="110" fill="#0078D4" opacity="0.3"/>
  <rect x="320" y="35" width="30" height="125" fill="#0078D4" opacity="0.3"/>

  <!-- Smoothed line (Background Blue, solid) - very flat due to 24hr window -->
  <path d="M 40 115 L 100 112 L 160 110 L 220 108 L 280 110 L 340 107 L 380 109"
        fill="none" stroke="#0078D4" stroke-width="3"/>

  <!-- 24-hour window indicator spanning entire width -->
  <rect x="40" y="165" width="340" height="20" rx="4" fill="#0078D4" opacity="0.15"/>
  <line x1="40" y1="160" x2="40" y2="185" stroke="#0078D4" stroke-width="1.5"/>
  <line x1="380" y1="160" x2="380" y2="185" stroke="#0078D4" stroke-width="1.5"/>
  <text x="210" y="180" font-family="Segoe UI, sans-serif" font-size="10" fill="#0078D4" text-anchor="middle">24 hours</text>

  <!-- Time axis -->
  <line x1="40" y1="160" x2="380" y2="160" stroke="#0D5A4C" stroke-width="1"/>
  <text x="40" y="195" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">00:00</text>
  <text x="125" y="195" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">06:00</text>
  <text x="210" y="195" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">12:00</text>
  <text x="295" y="195" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">18:00</text>
  <text x="360" y="195" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">24:00</text>

  <!-- Legend -->
  <rect x="45" y="5" width="15" height="12" fill="#0078D4" opacity="0.3"/>
  <text x="65" y="14" font-family="Segoe UI, sans-serif" font-size="10" fill="#323130">Scheduled Jobs</text>
  <line x1="155" y1="10" x2="175" y2="10" stroke="#0078D4" stroke-width="3"/>
  <text x="180" y="14" font-family="Segoe UI, sans-serif" font-size="10" fill="#323130">24-hr Smoothed</text>
</svg>