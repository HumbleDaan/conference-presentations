<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- 5-Minute Interactive Smoothing Window Visualization -->
  <!-- Shows spiky raw usage being smoothed over 5-minute window -->

  <!-- Background grid -->
  <defs>
    <pattern id="grid5min" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0D5A4C" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect x="40" y="20" width="340" height="140" fill="url(#grid5min)"/>

  <!-- Capacity limit line -->
  <line x1="40" y1="60" x2="380" y2="60" stroke="#0D5A4C" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="385" y="65" font-family="Segoe UI, sans-serif" font-size="11" fill="#0D5A4C">Capacity Limit</text>

  <!-- Raw spiky usage (Interactive Red, semi-transparent) -->
  <path d="M 40 140 L 60 130 L 80 60 L 100 90 L 120 30 L 140 80 L 160 50 L 180 110 L 200 40 L 220 100 L 240 55 L 260 85 L 280 45 L 300 95 L 320 70 L 340 120 L 360 80 L 380 100"
        fill="none" stroke="#D13438" stroke-width="2" opacity="0.4"/>

  <!-- Smoothed line (Interactive Red, solid) -->
  <path d="M 40 110 Q 80 90 120 75 T 200 70 T 280 72 T 360 85 L 380 90"
        fill="none" stroke="#D13438" stroke-width="3"/>

  <!-- 5-minute window indicator -->
  <rect x="200" y="165" width="100" height="20" rx="4" fill="#D13438" opacity="0.15"/>
  <line x1="200" y1="160" x2="200" y2="185" stroke="#D13438" stroke-width="1.5"/>
  <line x1="300" y1="160" x2="300" y2="185" stroke="#D13438" stroke-width="1.5"/>
  <text x="250" y="180" font-family="Segoe UI, sans-serif" font-size="10" fill="#D13438" text-anchor="middle">5 min</text>

  <!-- Time axis -->
  <line x1="40" y1="160" x2="380" y2="160" stroke="#0D5A4C" stroke-width="1"/>
  <text x="40" y="195" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">0</text>
  <text x="120" y="195" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">5m</text>
  <text x="200" y="195" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">10m</text>
  <text x="280" y="195" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">15m</text>
  <text x="360" y="195" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">20m</text>

  <!-- Legend -->
  <line x1="45" y1="10" x2="65" y2="10" stroke="#D13438" stroke-width="2" opacity="0.4"/>
  <text x="70" y="14" font-family="Segoe UI, sans-serif" font-size="10" fill="#323130">Raw Usage</text>
  <line x1="140" y1="10" x2="160" y2="10" stroke="#D13438" stroke-width="3"/>
  <text x="165" y="14" font-family="Segoe UI, sans-serif" font-size="10" fill="#323130">5-min Smoothed</text>
</svg>