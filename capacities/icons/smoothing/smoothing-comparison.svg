<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="500" height="280">
  <!-- Interactive vs Background Smoothing Comparison -->

  <!-- Title -->
  <text x="250" y="20" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#323130" text-anchor="middle">Smoothing Comparison: Interactive vs Background</text>

  <!-- Background grid -->
  <defs>
    <pattern id="gridCompare" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#0D5A4C" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect x="50" y="40" width="420" height="180" fill="url(#gridCompare)"/>

  <!-- Capacity limit line -->
  <line x1="50" y1="80" x2="470" y2="80" stroke="#0D5A4C" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="475" y="85" font-family="Segoe UI, sans-serif" font-size="10" fill="#0D5A4C">Limit</text>

  <!-- Interactive (Red) - spiky original -->
  <path d="M 50 180 L 80 150 L 110 60 L 140 120 L 170 45 L 200 100 L 230 70 L 260 140 L 290 55 L 320 130 L 350 75 L 380 110 L 410 65 L 440 125 L 470 90"
        fill="none" stroke="#D13438" stroke-width="1.5" opacity="0.35"/>

  <!-- Interactive smoothed (Red) -->
  <path d="M 50 140 Q 110 100 170 85 T 290 78 T 410 82 L 470 95"
        fill="none" stroke="#D13438" stroke-width="2.5"/>

  <!-- Background (Blue) - scheduled jobs -->
  <rect x="90" y="50" width="25" height="170" fill="#0078D4" opacity="0.2"/>
  <rect x="220" y="60" width="30" height="160" fill="#0078D4" opacity="0.2"/>
  <rect x="380" y="45" width="35" height="175" fill="#0078D4" opacity="0.2"/>

  <!-- Background smoothed (Blue) - very flat -->
  <path d="M 50 165 L 120 162 L 190 160 L 260 158 L 330 160 L 400 157 L 470 159"
        fill="none" stroke="#0078D4" stroke-width="2.5"/>

  <!-- Smoothing window annotations -->
  <!-- 5-min window -->
  <rect x="290" y="225" width="60" height="16" rx="3" fill="#D13438" opacity="0.15"/>
  <text x="320" y="237" font-family="Segoe UI, sans-serif" font-size="9" fill="#D13438" text-anchor="middle">5 min</text>

  <!-- 24-hr window -->
  <rect x="50" y="250" width="420" height="16" rx="3" fill="#0078D4" opacity="0.15"/>
  <text x="260" y="262" font-family="Segoe UI, sans-serif" font-size="9" fill="#0078D4" text-anchor="middle">24 hours</text>

  <!-- Legend -->
  <rect x="60" y="268" width="12" height="8" fill="#D13438"/>
  <text x="77" y="276" font-family="Segoe UI, sans-serif" font-size="9" fill="#323130">Interactive (5-min smoothing)</text>
  <rect x="240" y="268" width="12" height="8" fill="#0078D4"/>
  <text x="257" y="276" font-family="Segoe UI, sans-serif" font-size="9" fill="#323130">Background (24-hr smoothing)</text>

  <!-- Axis -->
  <line x1="50" y1="220" x2="470" y2="220" stroke="#0D5A4C" stroke-width="1"/>
  <text x="50" y="244" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">00:00</text>
  <text x="155" y="244" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">06:00</text>
  <text x="260" y="244" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">12:00</text>
  <text x="365" y="244" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">18:00</text>
  <text x="455" y="244" font-family="Segoe UI, sans-serif" font-size="9" fill="#0D5A4C">24:00</text>
</svg>