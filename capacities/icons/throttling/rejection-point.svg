<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200" width="450" height="200">
  <!-- Rejection Point - Shows when requests start getting rejected -->

  <text x="225" y="20" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#323130" text-anchor="middle">Throttling Progression to Rejection</text>

  <!-- Timeline bar -->
  <rect x="40" y="60" width="370" height="40" fill="none" stroke="#0D5A4C" stroke-width="1" rx="4"/>

  <!-- Healthy zone -->
  <rect x="40" y="60" width="120" height="40" fill="#107C10" opacity="0.3" rx="4"/>
  <text x="100" y="85" font-family="Segoe UI, sans-serif" font-size="10" fill="#107C10" text-anchor="middle">Normal</text>

  <!-- Delay zone -->
  <rect x="160" y="60" width="100" height="40" fill="#A84D0A" opacity="0.3"/>
  <text x="210" y="85" font-family="Segoe UI, sans-serif" font-size="10" fill="#A84D0A" text-anchor="middle">Delayed</text>

  <!-- Heavy throttle zone -->
  <rect x="260" y="60" width="80" height="40" fill="#D13438" opacity="0.3"/>
  <text x="300" y="85" font-family="Segoe UI, sans-serif" font-size="10" fill="#D13438" text-anchor="middle">Heavy</text>

  <!-- Rejection zone -->
  <rect x="340" y="60" width="70" height="40" fill="#D13438" opacity="0.7" rx="4"/>
  <text x="375" y="82" font-family="Segoe UI, sans-serif" font-size="9" fill="white" text-anchor="middle">REJECT</text>
  <text x="375" y="93" font-family="Segoe UI, sans-serif" font-size="8" fill="white" text-anchor="middle">429</text>

  <!-- Utilization markers -->
  <line x1="40" y1="105" x2="40" y2="115" stroke="#0D5A4C" stroke-width="1"/>
  <text x="40" y="127" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="middle">0%</text>

  <line x1="160" y1="105" x2="160" y2="115" stroke="#0D5A4C" stroke-width="1"/>
  <text x="160" y="127" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="middle">100%</text>

  <line x1="200" y1="105" x2="200" y2="115" stroke="#A84D0A" stroke-width="1.5"/>
  <text x="200" y="127" font-family="Segoe UI, sans-serif" font-size="8" fill="#A84D0A" text-anchor="middle">120%</text>

  <line x1="340" y1="105" x2="340" y2="115" stroke="#D13438" stroke-width="1.5"/>
  <text x="340" y="127" font-family="Segoe UI, sans-serif" font-size="8" fill="#D13438" text-anchor="middle">200%</text>

  <line x1="410" y1="105" x2="410" y2="115" stroke="#D13438" stroke-width="1"/>
  <text x="410" y="127" font-family="Segoe UI, sans-serif" font-size="8" fill="#D13438" text-anchor="middle">→</text>

  <!-- Description boxes -->
  <rect x="40" y="140" width="180" height="50" fill="#A84D0A" opacity="0.08" rx="4"/>
  <text x="130" y="155" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#A84D0A" text-anchor="middle">Throttle Response</text>
  <text x="130" y="170" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">Requests are delayed but complete.</text>
  <text x="130" y="182" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">User experiences slow response.</text>

  <rect x="240" y="140" width="180" height="50" fill="#D13438" opacity="0.08" rx="4"/>
  <text x="330" y="155" font-family="Segoe UI, sans-serif" font-size="9" font-weight="600" fill="#D13438" text-anchor="middle">Rejection Response (HTTP 429)</text>
  <text x="330" y="170" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">Requests fail with error code.</text>
  <text x="330" y="182" font-family="Segoe UI, sans-serif" font-size="8" fill="#323130" text-anchor="middle">Application must retry.</text>
</svg>