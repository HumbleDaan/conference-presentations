<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 280" width="450" height="280">
  <!-- Throttle Delay Curve - Shows how delay increases with overuse -->

  <text x="225" y="22" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#323130" text-anchor="middle">Interactive Request Delay vs. Capacity Utilization</text>

  <!-- Background grid -->
  <defs>
    <pattern id="delayGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0D5A4C" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect x="70" y="40" width="320" height="180" fill="url(#delayGrid)"/>

  <!-- Y axis (Delay) -->
  <line x1="70" y1="40" x2="70" y2="220" stroke="#0D5A4C" stroke-width="1.5"/>
  <text x="25" y="130" font-family="Segoe UI, sans-serif" font-size="10" fill="#323130" transform="rotate(-90, 25, 130)">Request Delay</text>
  <text x="60" y="50" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="end">6 min</text>
  <text x="60" y="100" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="end">4 min</text>
  <text x="60" y="150" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="end">2 min</text>
  <text x="60" y="200" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="end">0</text>

  <!-- X axis (Utilization) -->
  <line x1="70" y1="220" x2="390" y2="220" stroke="#0D5A4C" stroke-width="1.5"/>
  <text x="230" y="260" font-family="Segoe UI, sans-serif" font-size="10" fill="#323130" text-anchor="middle">Capacity Utilization %</text>
  <text x="70" y="235" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="middle">0%</text>
  <text x="150" y="235" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="middle">50%</text>
  <text x="230" y="235" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="middle">100%</text>
  <text x="310" y="235" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="middle">150%</text>
  <text x="390" y="235" font-family="Segoe UI, sans-serif" font-size="8" fill="#0D5A4C" text-anchor="middle">200%</text>

  <!-- Healthy zone (green) -->
  <rect x="70" y="40" width="160" height="180" fill="#107C10" opacity="0.1"/>

  <!-- Overage zone (orange) -->
  <rect x="230" y="40" width="50" height="180" fill="#A84D0A" opacity="0.1"/>

  <!-- Throttled zone (red) -->
  <rect x="280" y="40" width="110" height="180" fill="#D13438" opacity="0.1"/>

  <!-- 100% threshold line -->
  <line x1="230" y1="40" x2="230" y2="220" stroke="#0D5A4C" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="230" y="248" font-family="Segoe UI, sans-serif" font-size="7" fill="#0D5A4C" text-anchor="middle">Capacity</text>

  <!-- 120% threshold line (throttle start) -->
  <line x1="270" y1="40" x2="270" y2="220" stroke="#D13438" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="270" y="248" font-family="Segoe UI, sans-serif" font-size="7" fill="#D13438" text-anchor="middle">Throttle</text>

  <!-- Delay curve -->
  <path d="M 70 215 L 230 215 Q 250 215 270 210 Q 310 180 350 100 Q 370 60 390 50"
        fill="none" stroke="#D13438" stroke-width="3"/>

  <!-- Key points on curve -->
  <circle cx="230" cy="215" r="4" fill="#107C10"/>
  <circle cx="270" cy="210" r="4" fill="#A84D0A"/>
  <circle cx="350" cy="100" r="4" fill="#D13438"/>
  <circle cx="390" cy="50" r="4" fill="#D13438"/>

  <!-- Annotations -->
  <text x="150" y="200" font-family="Segoe UI, sans-serif" font-size="9" fill="#107C10" text-anchor="middle">No delay</text>
  <text x="260" y="195" font-family="Segoe UI, sans-serif" font-size="8" fill="#A84D0A" text-anchor="middle">~20s</text>
  <text x="350" y="88" font-family="Segoe UI, sans-serif" font-size="8" fill="#D13438" text-anchor="middle">~3min</text>
  <text x="400" y="68" font-family="Segoe UI, sans-serif" font-size="8" fill="#D13438">~6min</text>

  <!-- Zone labels -->
  <rect x="100" y="45" width="60" height="16" fill="#107C10" opacity="0.2" rx="3"/>
  <text x="130" y="56" font-family="Segoe UI, sans-serif" font-size="8" fill="#107C10" text-anchor="middle">Healthy</text>
  <rect x="232" y="45" width="45" height="16" fill="#A84D0A" opacity="0.2" rx="3"/>
  <text x="255" y="56" font-family="Segoe UI, sans-serif" font-size="8" fill="#A84D0A" text-anchor="middle">Overage</text>
  <rect x="310" y="45" width="60" height="16" fill="#D13438" opacity="0.2" rx="3"/>
  <text x="340" y="56" font-family="Segoe UI, sans-serif" font-size="8" fill="#D13438" text-anchor="middle">Throttled</text>
</svg>